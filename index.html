<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The White House - Live News</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #000;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: #f5f5f5;
        }

        header {
            background-color: #fff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #1a2e4a;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            color: #333;
        }

        .logo {
            text-align: center;
        }

        .logo-title {
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 2px;
        }

        .logo-subtitle {
            font-size: 8px;
            letter-spacing: 2px;
            color: #666;
        }

        .search-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            color: #666;
        }

        .hero {
            background-color: #1a2e4a;
            padding: 60px 40px;
            text-align: center;
            color: #fff;
        }

        .hero h1 {
            font-size: 72px;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .hero-date {
            font-size: 16px;
            font-weight: 300;
        }

        .main-content {
            background-color: #ffffff;
            padding: 60px 40px 40px;
            position: relative;
        }

        .video-container {
            width: 480px;
            max-width: 90%;
            margin: 0 auto 40px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .whitehouse-section {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .whitehouse-image {
            width: 100%;
            display: block;
            opacity: 0.95;
        }

        .join-btn {
            position: absolute;
            bottom: 80px;
            left: -100px;
            background-color: #b91c1c;
            color: #fff;
            padding: 12px 32px;
            border-radius: 25px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(185, 28, 28, 0.4);
            transition: background-color 0.3s;
        }

        .join-btn:hover {
            background-color: #991b1b;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 48px;
            }

            .video-container {
                width: 95%;
            }

            .join-btn {
                left: 20px;
                bottom: 60px;
                padding: 10px 24px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="menu-btn">
                ☰ MENU
            </button>
            <div class="logo">
                <div class="logo-title">THE WHITE HOUSE</div>
                <div class="logo-subtitle">WASHINGTON D.C.</div>
            </div>
            <button class="search-btn">
                SEARCH 🔍
            </button>
        </header>

        <section class="hero">
            <h1>Live News</h1>
            <div class="hero-date">Sunday, April 19, 2026</div>
        </section>

        <section class="main-content">
            <div class="video-container">
                <div class="video-wrapper">
                    <video controls autoplay muted>
                        <source src="message.mov" type="video/quicktime">
                        <source src="message.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>

            <div class="whitehouse-section">
                <img src="whd.png" alt="The White House" class="whitehouse-image">
                <button class="join-btn">JOIN NOW</button>
            </div>
        </section>
    </div>
</body>
</html>
